<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ANNI · Платформа клана</title>
<style>
:root{--bg:#0a0a12;--bg2:#11111f;--pan:#0d111f;--neon:#27e3d6;--mag:#ff3ea5;--gold:#e8b14c;--txt:#e9eefb;--mut:#8b93b5;--line:#23263c;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(1100px 560px at 75% -12%,#1a1330 0,var(--bg) 60%);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;min-height:100vh}
a,button{font-family:inherit}
.hidden{display:none!important}
.wrap{max-width:1180px;margin:0 auto;padding:14px}
/* header */
header{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding:10px 0;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:11px}
.core{width:38px;height:38px;border-radius:50%;border:2px solid var(--neon);box-shadow:0 0 16px var(--neon),inset 0 0 10px rgba(39,227,214,.4);animation:spin 6s linear infinite;position:relative}
.core::after{content:"";position:absolute;inset:8px;border-radius:50%;border:2px solid var(--mag);opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}
.brand h1{font-size:22px;letter-spacing:5px;background:linear-gradient(90deg,var(--neon),var(--mag));-webkit-background-clip:text;background-clip:text;color:transparent}
.brand .sub{font-size:10px;color:var(--gold);letter-spacing:2px}
nav{display:flex;gap:6px;flex-wrap:wrap}
nav button{background:#0f1430;border:1px solid var(--line);color:var(--txt);padding:8px 13px;border-radius:9px;cursor:pointer;font-size:13px}
nav button.act{border-color:var(--neon);color:var(--neon)}
.who{font-size:12px;color:var(--mut);text-align:right}
.who b{color:var(--gold)}
.lo{background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:4px 8px;cursor:pointer;font-size:11px;margin-left:6px}
/* cards/forms */
.card{background:linear-gradient(180deg,var(--bg2),#0c0c18);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:13px;position:relative;overflow:hidden}
.card h2{font-size:14px;letter-spacing:1px;color:var(--neon);text-transform:uppercase;margin-bottom:11px}
.kana{position:absolute;right:12px;top:8px;font-size:40px;color:rgba(255,62,165,.1);font-weight:700}
.grid{display:grid;gap:12px}
.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:780px){.g3,.g2,.g4{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.g3,.g2,.g4{grid-template-columns:1fr}}
label{display:block;font-size:11px;color:var(--mut);margin:8px 0 3px}
input,select,textarea{width:100%;background:#0c0f1c;border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:10px;font-size:14px}
textarea{min-height:60px;resize:vertical}
.btn{border:none;border-radius:10px;padding:10px 15px;font-weight:700;cursor:pointer;font-size:13px}
.pri{background:linear-gradient(135deg,var(--neon),#17a89c);color:#04201d}
.sec{background:#141a36;border:1px solid var(--line);color:var(--txt)}
.dng{background:#2a1320;border:1px solid #5e2540;color:#ff9ec4}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.spacer{flex:1}
/* entity card */
.ent{background:#0e1326;border:1px solid var(--line);border-radius:12px;padding:13px;position:relative}
.ent .av{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid var(--line)}
.ent .nm{font-weight:700;font-size:15px}
.ent .rl{font-size:11px;color:var(--gold)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.chip{font-size:11px;padding:3px 8px;border-radius:14px;border:1px solid #2a3358;background:#0f1430;color:var(--mut)}
.lvl{font-size:10px;color:#04201d;background:var(--neon);border-radius:6px;padding:2px 7px;font-weight:700}
.bar{height:7px;background:#161c33;border-radius:5px;overflow:hidden;margin-top:8px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--neon),var(--mag))}
.stat{background:#0e1326;border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
.stat b{display:block;font-size:26px;color:var(--gold)}
.stat span{font-size:11px;color:var(--mut)}
.muted{color:var(--mut);font-size:12px}
.tag{font-size:10px;border:1px solid var(--line);border-radius:8px;padding:2px 7px;color:var(--mut)}
.del{position:absolute;right:10px;top:10px;background:transparent;border:none;color:#5b6488;cursor:pointer;font-size:14px}
/* auth */
.authwrap{max-width:400px;margin:7vh auto}
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tabs button{flex:1;background:#0f1430;border:1px solid var(--line);color:var(--mut);padding:9px;border-radius:9px;cursor:pointer}
.tabs button.act{border-color:var(--neon);color:var(--neon)}
.linklike{color:var(--neon);cursor:pointer}
</style></head>
<body>

<div id="auth" class="wrap"><div class="authwrap">
 <div class="brand" style="justify-content:center;margin-bottom:8px"><div class="core"></div><div><h1>ANNI</h1><div class="sub">CLAN OS · ВХОД</div></div></div>
 <div class="card">
  <div class="tabs"><button id="tabLogin" class="act">Вход</button><button id="tabReg">Регистрация</button></div>
  <div id="regFields" class="hidden"><label>Имя</label><input id="aName" placeholder="Александр"/>
   <label>Роль</label><select id="aRole"><option>Создатель</option><option>Партнёр</option><option>Руководитель</option><option>Сотрудник</option></select></div>
  <label>Email</label><input id="aEmail" placeholder="you@clan.ai"/>
  <label>Пароль</label><input id="aPass" type="password" placeholder="••••••"/>
  <div style="margin-top:12px" class="row"><button id="authBtn" class="btn pri">Войти</button><span class="spacer"></span><span class="muted">данные хранятся локально</span></div>
  <div id="authMsg" class="muted" style="margin-top:8px;color:var(--mag)"></div>
 </div>
</div></div>

<div id="appShell" class="wrap hidden">
 <header>
  <div class="brand"><div class="core"></div><div><h1>ANNI</h1><div class="sub">ПЛАТФОРМА КЛАНА</div></div></div>
  <nav id="nav">
   <button data-v="dash" class="act">Дашборд</button>
   <button data-v="companies">Компании</button>
   <button data-v="agents">AI-агенты</button>
   <button data-v="people">Сотрудники</button>
   <button data-v="data">Данные</button>
  </nav>
  <div class="who" id="who"></div>
 </header>
 <div id="app"></div>
 <div style="text-align:center;font-size:11px;color:var(--mut);margin:16px 0">ANNI · рабочая платформа · v1 · данные сохраняются в этом браузере</div>
</div>

<script>
const AV=["🛡️","⚔️","🦊","🐉","🦅","🤖","🧠","💠","🔥","🌐","📈","🎯","🛰️","⚡","🥷","👁️"];
const COL=["#27e3d6","#ff3ea5","#e8b14c","#7c5cff","#3ddc84","#ff7a59"];
const KEY="anni_clan_v1";
let DB=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||seed()}catch(e){return seed()}}
function save(){localStorage.setItem(KEY,JSON.stringify(DB))}
function seed(){const d={users:[],session:null,companies:[
 {id:id(),name:"Sarex",dir:"Серверы и хостинг",desc:"Инфраструктура платформы",income:0,turnover:0},
 {id:id(),name:"Нейромицелий",dir:"AI-платформа",desc:"Закрывает болевые точки бизнеса",income:0,turnover:0},
 {id:id(),name:"Bliss pay",dir:"Платежи / финтех",desc:"",income:0,turnover:0},
 {id:id(),name:"Spirit",dir:"—",desc:"",income:0,turnover:0},
 {id:id(),name:"Turbo",dir:"—",desc:"",income:0,turnover:0},
 {id:id(),name:"Разработка игр",dir:"Видеоигры",desc:"",income:0,turnover:0},
],agents:[],people:[]};localStorage.setItem(KEY,JSON.stringify(d));return d}
function id(){return Math.random().toString(36).slice(2,9)}
function esc(s){return(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function chips(s){return(s||"").split(",").map(x=>x.trim()).filter(Boolean).map(x=>'<span class="chip">'+esc(x)+'</span>').join("")}
function coById(id){return DB.companies.find(c=>c.id===id)}
function cname(id){const c=coById(id);return c?c.name:"—"}

/* ---------- AUTH ---------- */
const tabLogin=document.getElementById('tabLogin'),tabReg=document.getElementById('tabReg'),regFields=document.getElementById('regFields'),authBtn=document.getElementById('authBtn'),authMsg=document.getElementById('authMsg');
let mode="login";
tabLogin.onclick=()=>{mode="login";tabLogin.classList.add('act');tabReg.classList.remove('act');regFields.classList.add('hidden');authBtn.textContent="Войти";authMsg.textContent=""};
tabReg.onclick=()=>{mode="reg";tabReg.classList.add('act');tabLogin.classList.remove('act');regFields.classList.remove('hidden');authBtn.textContent="Создать аккаунт";authMsg.textContent=""};
authBtn.onclick=()=>{const email=val('aEmail').toLowerCase(),pass=val('aPass');if(!email||!pass){authMsg.textContent="Введите email и пароль";return}
 if(mode==="reg"){if(DB.users.find(u=>u.email===email)){authMsg.textContent="Такой email уже есть";return}
  const u={id:id(),name:val('aName')||"Без имени",role:val('aRole'),email,pass,av:AV[DB.users.length%AV.length],col:COL[DB.users.length%COL.length]};
  DB.users.push(u);DB.session=u.id;save();enter()}
 else{const u=DB.users.find(u=>u.email===email&&u.pass===pass);if(!u){authMsg.textContent="Неверный email или пароль";return}DB.session=u.id;save();enter()}};
function val(id){return document.getElementById(id).value.trim()}
function me(){return DB.users.find(u=>u.id===DB.session)}
function enter(){document.getElementById('auth').classList.add('hidden');document.getElementById('appShell').classList.remove('hidden');const u=me();
 document.getElementById('who').innerHTML='<b>'+esc(u.name)+'</b> · '+esc(u.role)+'<button class="lo" id="logout">Выход</button>';
 document.getElementById('logout').onclick=()=>{DB.session=null;save();location.reload()};go('dash')}
function canManage(){const r=me().role;return r==="Создатель"||r==="Партнёр"||r==="Руководитель"}

/* ---------- ROUTER ---------- */
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('act'));b.classList.add('act');go(b.dataset.v)});
let view="dash",sel=null;
function go(v){view=v;render()}
function render(){const a=document.getElementById('app');
 if(view==="dash")a.innerHTML=vDash();
 else if(view==="companies")a.innerHTML=sel?vCompany(sel):vCompanies();
 else if(view==="agents")a.innerHTML=vAgents();
 else if(view==="people")a.innerHTML=vPeople();
 else if(view==="data")a.innerHTML=vData();
 bind();}

/* ---------- VIEWS ---------- */
function vDash(){const inc=DB.companies.reduce((s,c)=>s+(+c.income||0),0),tov=DB.companies.reduce((s,c)=>s+(+c.turnover||0),0);
 const max=Math.max(1,...DB.companies.map(c=>+c.income||0));
 return '<div class="card"><div class="kana">統</div><h2>Дашборд клана</h2>'+
 '<div class="grid g4"><div class="stat"><b>'+DB.companies.length+'</b><span>компаний</span></div>'+
 '<div class="stat"><b>'+DB.agents.length+'</b><span>AI-агентов</span></div>'+
 '<div class="stat"><b>'+DB.people.length+'</b><span>сотрудников</span></div>'+
 '<div class="stat"><b>'+fmt(inc)+'</b><span>доход (€/мес)</span></div></div>'+
 '<div style="margin-top:8px" class="muted">Совокупный оборот: '+fmt(tov)+' € · KPI обновляются по мере подключения интеграций</div></div>'+
 '<div class="card"><h2>Доход по компаниям</h2>'+DB.companies.map(c=>'<div class="row" style="margin-bottom:8px"><div style="width:130px;font-size:13px">'+esc(c.name)+'</div><div class="bar" style="flex:1"><i style="width:'+((+c.income||0)/max*100)+'%"></i></div><div style="width:90px;text-align:right;font-size:12px;color:var(--gold)">'+fmt(+c.income||0)+' €</div></div>').join("")+'</div>'+
 '<div class="card"><h2>Кто с кем работает</h2>'+(DB.people.length?DB.people.map(p=>'<div class="row" style="margin-bottom:6px;font-size:13px">'+p.av+' <b>'+esc(p.name)+'</b> <span class="muted">('+esc(cname(p.coId))+')</span> <span class="spacer"></span> использует → <span class="tag">'+esc(agName(p.agentId))+'</span></div>').join(""):'<div class="muted">Пока нет сотрудников. Добавьте во вкладке «Сотрудники».</div>')+'</div>';}
function agName(id){const a=DB.agents.find(a=>a.id===id);return a?a.av+" "+a.name:"—"}

function vCompanies(){return '<div class="card"><div class="kana">団</div><h2>Компании холдинга</h2><div class="grid g3">'+
 DB.companies.map(c=>'<div class="ent"><div class="row"><div class="av" style="border-color:var(--gold)">🏢</div><div><div class="nm">'+esc(c.name)+'</div><div class="rl">'+esc(c.dir||"—")+'</div></div></div>'+
 '<div class="muted" style="margin-top:8px">Доход: '+fmt(+c.income||0)+' € · Оборот: '+fmt(+c.turnover||0)+' €</div>'+
 '<div class="row" style="margin-top:10px"><button class="btn sec" data-open="'+c.id+'">Открыть</button></div></div>').join("")+'</div></div>'+
 (canManage()?'<div class="card"><h2>Добавить компанию</h2><div class="grid g2"><div><label>Название</label><input id="cName"/></div><div><label>Направление</label><input id="cDir"/></div></div><label>Описание</label><input id="cDesc"/><div style="margin-top:10px"><button class="btn pri" id="addCo">Создать</button></div></div>':'');}

function vCompany(cid){const c=coById(cid);if(!c)return vCompanies();
 const ag=DB.agents.filter(a=>a.coId===cid),pe=DB.people.filter(p=>p.coId===cid);
 return '<div class="card"><div class="row"><button class="btn sec" id="back">← Компании</button><span class="spacer"></span>'+(canManage()?'<button class="btn dng" data-delco="'+cid+'">Удалить</button>':'')+'</div></div>'+
 '<div class="card"><div class="kana">社</div><h2>'+esc(c.name)+'</h2>'+
 '<div class="grid g2"><div><label>Направление</label><input id="eDir" value="'+esc(c.dir)+'"></div><div><label>Описание</label><input id="eDesc" value="'+esc(c.desc)+'"></div>'+
 '<div><label>Доход €/мес (или из интеграции)</label><input id="eInc" type="number" value="'+(+c.income||0)+'"></div><div><label>Оборот €/мес</label><input id="eTov" type="number" value="'+(+c.turnover||0)+'"></div></div>'+
 '<div style="margin-top:10px" class="row"><button class="btn pri" data-saveco="'+cid+'">Сохранить</button><span class="tag">Интеграция дохода — подключается на этапе бэкенда</span></div></div>'+
 '<div class="card"><h2>AI-агенты компании ('+ag.length+')</h2><div class="grid g3">'+(ag.map(agentCard).join("")||'<div class="muted">Нет агентов</div>')+'</div></div>'+
 '<div class="card"><h2>Сотрудники компании ('+pe.length+')</h2><div class="grid g3">'+(pe.map(personCard).join("")||'<div class="muted">Нет сотрудников</div>')+'</div></div>';}

function agentCard(a){return '<div class="ent">'+(canManage()?'<button class="del" data-delag="'+a.id+'">✕</button>':'')+'<div class="row"><div class="av" style="border-color:'+a.col+';color:'+a.col+'">'+a.av+'</div><div><div class="nm">'+esc(a.name)+'</div><div class="rl">'+esc(a.role)+' · '+esc(cname(a.coId))+'</div></div></div>'+
 '<div class="chips">'+chips(a.skills)+'</div>'+
 '<div class="row" style="margin-top:8px"><span class="lvl">LVL '+(a.level||1)+'</span><div class="bar" style="flex:1"><i style="width:'+(a.xp||20)+'%"></i></div></div>'+
 (a.accounts?'<div class="muted" style="margin-top:6px">Аккаунты: '+esc(a.accounts)+'</div>':'')+'</div>';}
function personCard(p){return '<div class="ent">'+(canManage()?'<button class="del" data-delp="'+p.id+'">✕</button>':'')+'<div class="row"><div class="av" style="border-color:'+p.col+';color:'+p.col+'">'+p.av+'</div><div><div class="nm">'+esc(p.name)+'</div><div class="rl">'+esc(p.role)+' · '+esc(cname(p.coId))+'</div></div></div>'+
 '<div class="chips">'+chips(p.skills)+'</div>'+
 '<div class="muted" style="margin-top:7px">Агент: <span class="tag">'+esc(agName(p.agentId))+'</span></div></div>';}

function vAgents(){return '<div class="card"><div class="kana">士</div><h2>AI-агенты ('+DB.agents.length+')</h2><div class="grid g3">'+(DB.agents.map(agentCard).join("")||'<div class="muted">Пока нет агентов</div>')+'</div></div>'+
 (canManage()?'<div class="card"><h2>Создать AI-агента</h2><div class="grid g2">'+
 '<div><label>Имя</label><input id="agN"/></div><div><label>Роль/функция</label><input id="agR" placeholder="Лиды / Контент / DevOps"/></div>'+
 '<div><label>Компания</label>'+coSelect("agC")+'</div><div><label>Навыки (через запятую)</label><input id="agS"/></div>'+
 '<div><label>Привязанные рабочие аккаунты</label><input id="agA" placeholder="Telegram, почта, CRM"/></div><div><label>Обучение (заметки)</label><input id="agT"/></div></div>'+
 '<div style="margin-top:10px"><button class="btn pri" id="addAg">Создать агента</button></div></div>':'');}

function vPeople(){return '<div class="card"><div class="kana">人</div><h2>Сотрудники — цифровые копии ('+DB.people.length+')</h2><div class="grid g3">'+(DB.people.map(personCard).join("")||'<div class="muted">Пока нет сотрудников</div>')+'</div></div>'+
 (canManage()?'<div class="card"><h2>Добавить сотрудника</h2><div class="grid g2">'+
 '<div><label>Имя</label><input id="pN"/></div><div><label>Роль</label><input id="pR"/></div>'+
 '<div><label>Компания</label>'+coSelect("pC")+'</div><div><label>Навыки / «шмотки» (через запятую)</label><input id="pS"/></div>'+
 '<div><label>Использует AI-агента</label>'+agSelect("pAg")+'</div><div><label>Рабочие аккаунты</label><input id="pAcc"/></div></div>'+
 '<div style="margin-top:10px"><button class="btn pri" id="addP">Добавить</button></div></div>':'');}

function vData(){return '<div class="card"><div class="kana">蔵</div><h2>Данные и независимость</h2>'+
 '<div class="muted">Все данные хранятся локально в этом браузере. Экспортируй для бэкапа и переноса (независимость платформы).</div>'+
 '<div class="row" style="margin-top:12px"><button class="btn pri" id="exp">⬇ Экспорт JSON</button><button class="btn sec" id="impBtn">⬆ Импорт JSON</button><button class="btn dng" id="reset">Сбросить всё</button></div>'+
 '<input id="impFile" type="file" accept="application/json" class="hidden"/></div>';}

function coSelect(idv){return '<select id="'+idv+'">'+DB.companies.map(c=>'<option value="'+c.id+'">'+esc(c.name)+'</option>').join("")+'</select>'}
function agSelect(idv){return '<select id="'+idv+'"><option value="">— нет —</option>'+DB.agents.map(a=>'<option value="'+a.id+'">'+esc(a.name)+'</option>').join("")+'</select>'}
function fmt(n){return (Math.round(n)||0).toLocaleString('ru-RU')}

/* ---------- BIND ---------- */
function bind(){
 const q=s=>document.getElementById(s);
 if(q('addCo'))q('addCo').onclick=()=>{const n=val('cName');if(!n)return;DB.companies.push({id:id(),name:n,dir:val('cDir'),desc:val('cDesc'),income:0,turnover:0});save();render()};
 document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{sel=b.dataset.open;render()});
 if(q('back'))q('back').onclick=()=>{sel=null;render()};
 document.querySelectorAll('[data-saveco]').forEach(b=>b.onclick=()=>{const c=coById(b.dataset.saveco);c.dir=val('eDir');c.desc=val('eDesc');c.income=+val('eInc')||0;c.turnover=+val('eTov')||0;save();alert('Сохранено, Александр.')});
 document.querySelectorAll('[data-delco]').forEach(b=>b.onclick=()=>{if(confirm('Удалить компанию?')){DB.companies=DB.companies.filter(c=>c.id!==b.dataset.delco);sel=null;save();render()}});
 if(q('addAg'))q('addAg').onclick=()=>{const n=val('agN');if(!n)return;DB.agents.push({id:id(),name:n,role:val('agR'),coId:val('agC'),skills:val('agS'),accounts:val('agA'),train:val('agT'),level:1,xp:15+Math.floor(Math.random()*40),av:AV[DB.agents.length%AV.length],col:COL[DB.agents.length%COL.length]});save();render()};
 if(q('addP'))q('addP').onclick=()=>{const n=val('pN');if(!n)return;DB.people.push({id:id(),name:n,role:val('pR'),coId:val('pC'),skills:val('pS'),agentId:val('pAg'),accounts:val('pAcc'),av:AV[(DB.people.length+3)%AV.length],col:COL[(DB.people.length+2)%COL.length]});save();render()};
 document.querySelectorAll('[data-delag]').forEach(b=>b.onclick=()=>{DB.agents=DB.agents.filter(a=>a.id!==b.dataset.delag);save();render()});
 document.querySelectorAll('[data-delp]').forEach(b=>b.onclick=()=>{DB.people=DB.people.filter(p=>p.id!==b.dataset.delp);save();render()});
 if(q('exp'))q('exp').onclick=()=>{const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download="anni_clan_backup.json";a.click()};
 if(q('impBtn'))q('impBtn').onclick=()=>q('impFile').click();
 if(q('impFile'))q('impFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);d.session=DB.session;DB=d;save();render();alert('Импортировано.')}catch(x){alert('Файл не распознан')}};r.readAsText(f)};
 if(q('reset'))q('reset').onclick=()=>{if(confirm('Сбросить все данные платформы?')){localStorage.removeItem(KEY);location.reload()}};
}

/* autstart */
if(DB.session&&me())enter();
</script>
</body></html>
