<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ANNI · Clan OS</title>
<style>
:root{--bg:#070710;--bg2:#0e0e1d;--pan:#0c0f1f;--neon:#27e3d6;--mag:#ff3ea5;--gold:#e8b14c;--txt:#e9eefb;--mut:#8b93b5;--line:#20233a;--ok:#3ddc84}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(1100px 560px at 78% -12%,#1a1030 0,var(--bg) 60%);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;min-height:100vh}
.hidden{display:none!important}
.wrap{max-width:1200px;margin:0 auto;padding:12px}
header{display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line);padding:10px 0;margin-bottom:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px}
.core{width:36px;height:36px;border-radius:50%;border:2px solid var(--neon);box-shadow:0 0 16px var(--neon),inset 0 0 9px rgba(39,227,214,.4);animation:spin 6s linear infinite;position:relative}
.core::after{content:"";position:absolute;inset:7px;border-radius:50%;border:2px solid var(--mag);opacity:.75}
@keyframes spin{to{transform:rotate(360deg)}}
.brand h1{font-size:20px;letter-spacing:5px;background:linear-gradient(90deg,var(--neon),var(--mag));-webkit-background-clip:text;background-clip:text;color:transparent}
.brand .sub{font-size:9px;color:var(--gold);letter-spacing:2px}
nav{display:flex;gap:5px;flex-wrap:wrap}
nav button{background:#0e1430;border:1px solid var(--line);color:var(--txt);padding:7px 12px;border-radius:9px;cursor:pointer;font-size:13px}
nav button.act{border-color:var(--neon);color:var(--neon);box-shadow:0 0 10px rgba(39,227,214,.25)}
.who{font-size:12px;color:var(--mut);text-align:right}.who b{color:var(--gold)}
.lo{background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:4px 8px;cursor:pointer;font-size:11px;margin-left:6px}
.card{background:linear-gradient(180deg,var(--bg2),#0a0a16);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:13px;position:relative;overflow:hidden}
.card h2{font-size:13px;letter-spacing:1px;color:var(--neon);text-transform:uppercase;margin-bottom:11px}
.kana{position:absolute;right:12px;top:6px;font-size:46px;color:rgba(255,62,165,.09);font-weight:700}
.grid{display:grid;gap:12px}.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:820px){.g4,.g3,.g2{grid-template-columns:1fr 1fr}}@media(max-width:520px){.g4,.g3,.g2{grid-template-columns:1fr}}
label{display:block;font-size:11px;color:var(--mut);margin:8px 0 3px}
input,select,textarea{width:100%;background:#0b0e1c;border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:10px;font-size:14px}
.btn{border:none;border-radius:10px;padding:9px 14px;font-weight:700;cursor:pointer;font-size:13px}
.pri{background:linear-gradient(135deg,var(--neon),#17a89c);color:#04201d}.sec{background:#141a36;border:1px solid var(--line);color:var(--txt)}.dng{background:#2a1320;border:1px solid #5e2540;color:#ff9ec4}
.gold{background:linear-gradient(135deg,var(--gold),#b6852f);color:#231603}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.spacer{flex:1}
.ent{background:#0c1124;border:1px solid var(--line);border-radius:12px;padding:13px;position:relative}
.av{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid var(--line)}
.nm{font-weight:700;font-size:15px}.rl{font-size:11px;color:var(--gold)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}.chip{font-size:11px;padding:3px 8px;border-radius:14px;border:1px solid #2a3358;background:#0f1430;color:var(--mut)}
.lvl{font-size:10px;color:#04201d;background:var(--neon);border-radius:6px;padding:2px 7px;font-weight:700}
.bar{height:7px;background:#161c33;border-radius:5px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--neon),var(--mag))}
.stat{background:#0c1124;border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}.stat b{display:block;font-size:25px;color:var(--gold)}.stat span{font-size:11px;color:var(--mut)}
.muted{color:var(--mut);font-size:12px}.tag{font-size:10px;border:1px solid var(--line);border-radius:8px;padding:2px 7px;color:var(--mut)}
.del{position:absolute;right:10px;top:10px;background:transparent;border:none;color:#5b6488;cursor:pointer;font-size:14px}
.authwrap{max-width:400px;margin:7vh auto}.tabs{display:flex;gap:6px;margin-bottom:12px}.tabs button{flex:1;background:#0e1430;border:1px solid var(--line);color:var(--mut);padding:9px;border-radius:9px;cursor:pointer}.tabs button.act{border-color:var(--neon);color:var(--neon)}
/* anni chat */
.chat{height:320px;overflow:auto;display:flex;flex-direction:column;gap:9px;padding-right:4px}
.msg{max-width:86%;padding:9px 12px;border-radius:12px;font-size:14px;line-height:1.4}
.me{align-self:flex-end;background:linear-gradient(135deg,#1d2747,#172036);border:1px solid #2b3a66}
.an{align-self:flex-start;background:linear-gradient(135deg,#11233a,#0c1b2e);border:1px solid #1f4a55}
.play{margin-top:7px;font-size:12px;color:var(--gold);background:transparent;border:1px solid var(--gold);border-radius:8px;padding:3px 9px;cursor:pointer}
.wave{height:20px;display:flex;align-items:flex-end;gap:3px;margin:6px 0}.wave span{width:4px;background:var(--neon);border-radius:2px;height:4px}
.tree .node{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--line);border-radius:10px;background:#0c1124;margin-bottom:7px}
.tree .lname{font-size:10px;color:var(--gold);letter-spacing:1px;margin:10px 0 5px}
.foot{text-align:center;font-size:11px;color:var(--mut);margin:16px 0}
.statusbadge{font-size:10px;padding:2px 7px;border-radius:8px}
.s-todo{background:#2a2440;color:#c9b6ff}.s-doing{background:#16344a;color:#7fd6ff}.s-done{background:#15331f;color:var(--ok)}
</style></head>
<body>

<div id="auth" class="wrap"><div class="authwrap">
 <div class="brand" style="justify-content:center;margin-bottom:8px"><div class="core"></div><div><h1>ANNI</h1><div class="sub">CLAN OS · 侍 КИБЕРПАНК</div></div></div>
 <div class="card">
  <div class="tabs"><button id="tabLogin" class="act">Вход</button><button id="tabReg">Регистрация</button></div>
  <div id="regFields" class="hidden"><label>Имя</label><input id="aName" placeholder="Александр"/>
   <label>Роль</label><select id="aRole"><option>Создатель</option><option>Партнёр</option><option>Руководитель</option><option>Сотрудник</option></select></div>
  <label>Email</label><input id="aEmail" placeholder="you@clan.ai"/>
  <label>Пароль</label><input id="aPass" type="password" placeholder="придумайте пароль"/>
  <div style="margin-top:12px" class="row"><button id="authBtn" class="btn pri">Войти</button><span class="spacer"></span><span class="muted">данные хранятся локально</span></div>
  <div id="authMsg" class="muted" style="margin-top:8px;color:var(--mag)"></div>
 </div>
</div></div>

<div id="appShell" class="wrap hidden">
 <header>
  <div class="brand"><div class="core"></div><div><h1>ANNI</h1><div class="sub">CLAN OS · 侍</div></div></div>
  <nav id="nav">
   <button data-v="dash" class="act">Дашборд</button>
   <button data-v="anni">Anni</button>
   <button data-v="hierarchy">Иерархия</button>
   <button data-v="companies">Компании</button>
   <button data-v="agents">Агенты</button>
   <button data-v="people">Сотрудники</button>
   <button data-v="tasks">Задачи</button>
   <button data-v="integrations">Интеграции</button>
   <button data-v="data">Данные</button>
  </nav>
  <div class="who" id="who"></div>
 </header>
 <div id="app"></div>
 <div class="foot">ANNI · Clan OS · самурайский киберпанк · v3 · egregorsystem.github.io/anni-clan</div>
</div>

<script>
const AV=["🛡️","⚔️","🦊","🐉","🦅","🤖","🧠","💠","🔥","🌐","📈","🎯","🛰️","⚡","🥷","👁️"];
const COL=["#27e3d6","#ff3ea5","#e8b14c","#7c5cff","#3ddc84","#ff7a59"];
const KEY="anni_clan_v2";
let DB=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||seed()}catch(e){return seed()}}
function save(){localStorage.setItem(KEY,JSON.stringify(DB))}
function id(){return Math.random().toString(36).slice(2,9)}
function seed(){const d={users:[],session:null,tasks:[],companies:[
 {id:id(),name:"Sarex",dir:"Серверы и хостинг",desc:"Инфраструктура платформы",income:0,turnover:0},
 {id:id(),name:"Нейромицелий",dir:"AI-платформа",desc:"Закрывает болевые точки бизнеса",income:0,turnover:0},
 {id:id(),name:"Bliss pay",dir:"Платежи / финтех",desc:"",income:0,turnover:0},
 {id:id(),name:"Spirit",dir:"—",desc:"",income:0,turnover:0},
 {id:id(),name:"Turbo",dir:"—",desc:"",income:0,turnover:0},
 {id:id(),name:"Разработка игр",dir:"Видеоигры",desc:"",income:0,turnover:0},
],agents:[],people:[]};localStorage.setItem(KEY,JSON.stringify(d));return d}
function esc(s){return(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function chips(s){return(s||"").split(",").map(x=>x.trim()).filter(Boolean).map(x=>'<span class="chip">'+esc(x)+'</span>').join("")}
function coById(i){return DB.companies.find(c=>c.id===i)}
function cname(i){const c=coById(i);return c?c.name:"—"}
function agById(i){return DB.agents.find(a=>a.id===i)}
function agName(i){const a=agById(i);return a?a.av+" "+a.name:"—"}
function fmt(n){return (Math.round(n)||0).toLocaleString('ru-RU')}
function val(i){return document.getElementById(i).value.trim()}
function me(){return DB.users.find(u=>u.id===DB.session)}
function canManage(){const r=me().role;return r==="Создатель"||r==="Партнёр"||r==="Руководитель"}

/* AUTH */
const tabLogin=document.getElementById('tabLogin'),tabReg=document.getElementById('tabReg'),regFields=document.getElementById('regFields'),authBtn=document.getElementById('authBtn'),authMsg=document.getElementById('authMsg');
let mode="login";
tabLogin.onclick=()=>{mode="login";tabLogin.classList.add('act');tabReg.classList.remove('act');regFields.classList.add('hidden');authBtn.textContent="Войти";authMsg.textContent=""};
tabReg.onclick=()=>{mode="reg";tabReg.classList.add('act');tabLogin.classList.remove('act');regFields.classList.remove('hidden');authBtn.textContent="Создать аккаунт";authMsg.textContent=""};
authBtn.onclick=()=>{const email=val('aEmail').toLowerCase(),pass=val('aPass');if(!email||!pass){authMsg.textContent="Введите email и пароль";return}
 if(mode==="reg"){if(DB.users.find(u=>u.email===email)){authMsg.textContent="Такой email уже есть";return}
  const u={id:id(),name:val('aName')||"Без имени",role:val('aRole'),email,pass,av:AV[DB.users.length%AV.length],col:COL[DB.users.length%COL.length]};DB.users.push(u);DB.session=u.id;save();enter()}
 else{const u=DB.users.find(u=>u.email===email&&u.pass===pass);if(!u){authMsg.textContent="Неверный email или пароль";return}DB.session=u.id;save();enter()}};
function enter(){document.getElementById('auth').classList.add('hidden');document.getElementById('appShell').classList.remove('hidden');const u=me();
 document.getElementById('who').innerHTML='<b>'+esc(u.name)+'</b> · '+esc(u.role)+'<button class="lo" id="logout">Выход</button>';
 document.getElementById('logout').onclick=()=>{DB.session=null;save();location.reload()};go('dash')}

/* ROUTER */
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('act'));b.classList.add('act');go(b.dataset.v)});
let view="dash",sel=null;
function go(v){view=v;render()}
function render(){const a=document.getElementById('app');
 a.innerHTML=({dash:vDash,anni:vAnni,hierarchy:vHier,companies:()=>sel?vCompany(sel):vCompanies(),agents:vAgents,people:vPeople,tasks:vTasks,integrations:vInteg,data:vData}[view])();
 bind(); if(view==="anni")renderChat();}

/* DASHBOARD */
function vDash(){const inc=DB.companies.reduce((s,c)=>s+(+c.income||0),0),tov=DB.companies.reduce((s,c)=>s+(+c.turnover||0),0);
 const max=Math.max(1,...DB.companies.map(c=>+c.income||0));const open=DB.tasks.filter(t=>t.status!=="done").length;
 return '<div class="card"><div class="kana">統</div><h2>Дашборд клана</h2><div class="grid g4">'+
 '<div class="stat"><b>'+DB.companies.length+'</b><span>компаний</span></div>'+
 '<div class="stat"><b>'+DB.agents.length+'</b><span>AI-агентов</span></div>'+
 '<div class="stat"><b>'+DB.people.length+'</b><span>сотрудников</span></div>'+
 '<div class="stat"><b>'+open+'</b><span>задач в работе</span></div></div>'+
 '<div class="muted" style="margin-top:8px">Доход: '+fmt(inc)+' €/мес · Оборот: '+fmt(tov)+' €/мес</div></div>'+
 '<div class="card"><h2>Доход по компаниям</h2>'+DB.companies.map(c=>'<div class="row" style="margin-bottom:8px"><div style="width:130px;font-size:13px">'+esc(c.name)+'</div><div class="bar" style="flex:1"><i style="width:'+((+c.income||0)/max*100)+'%"></i></div><div style="width:96px;text-align:right;font-size:12px;color:var(--gold)">'+fmt(+c.income||0)+' €</div></div>').join("")+'</div>';}

/* ANNI CHAT */
let CHAT=[{r:"an",t:"Да, я вас слушаю, Александр. Дайте задачу — распределю агентам. Примеры: «поручи <агент> сделать <что>», «статус», «доход Sarex 5000»."}];
function vAnni(){return '<div class="card"><div class="kana">話</div><h2>Чат с Anni</h2><div class="wave" id="wave"></div><div class="chat" id="chat"></div>'+
 '<div class="row" style="margin-top:10px"><input id="amsg" placeholder="Скажи Anni: поручи Контент-агенту сделать ролик"/><button class="btn mic sec" id="mic">🎙</button><button class="btn pri" id="asend">▶</button></div>'+
 '<div class="muted" style="margin-top:6px">«Воспроизвести» озвучивает ответ по-русски. 🎙 — распознавание речи (Chrome/Safari).</div></div>';}
function renderChat(){const c=document.getElementById('chat');if(!c)return;c.innerHTML="";CHAT.forEach(m=>{const d=document.createElement('div');d.className='msg '+(m.r==="me"?"me":"an");d.textContent=m.t;if(m.r==="an"){const b=document.createElement('button');b.className='play';b.textContent='▶ Воспроизвести';b.onclick=()=>speak(m.t);d.appendChild(document.createElement('br'));d.appendChild(b);}c.appendChild(d);});c.scrollTop=c.scrollHeight;
 const w=document.getElementById('wave');if(w&&!w.children.length){for(let i=0;i<32;i++)w.appendChild(document.createElement('span'));}}
let waveOn=false;function animWave(){const w=document.getElementById('wave');if(w)for(const b of w.children)b.style.height=(waveOn?4+Math.random()*16:4)+'px';requestAnimationFrame(animWave)}animWave();
function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.lang='ru-RU';const v=speechSynthesis.getVoices().find(x=>x.lang&&x.lang.startsWith('ru'));if(v)u.voice=v;waveOn=true;u.onend=()=>waveOn=false;speechSynthesis.cancel();speechSynthesis.speak(u)}catch(e){}}
function anniReply(q){const Q=q.toLowerCase();let r;
 let m=q.match(/поруч\S*\s+(.+?)\s+(сделать|сделай|сдела)\s+(.+)/i)||q.match(/задач\S*\s+(.+?):\s*(.+)/i);
 if(/поруч|задач/i.test(Q)){const title=q.replace(/^.*?(поруч\S*|задач\S*)/i,"").trim()||"Новая задача";DB.tasks.push({id:id(),title:title,assigneeType:"agent",assigneeId:(DB.agents[0]||{}).id||"",status:"todo",progress:0});save();r="Принято, Александр. Создала задачу: «"+title+"». Добавила в журнал задач, статус — в работе. Подтвердите исполнителя во вкладке «Задачи».";}
 else if(/доход\s+\w+\s+\d+/i.test(Q)){const mm=q.match(/доход\s+(.+?)\s+(\d+)/i);const co=DB.companies.find(c=>c.name.toLowerCase()===mm[1].toLowerCase());if(co){co.income=+mm[2];save();r="Обновила доход компании "+co.name+": "+fmt(co.income)+" €/мес.";}else r="Не нашла такую компанию, Александр.";}
 else if(/статус|дел/.test(Q)){const open=DB.tasks.filter(t=>t.status!=="done").length;r="Сейчас: "+DB.agents.length+" агентов, "+DB.people.length+" сотрудников, "+open+" задач в работе. Нужен подробный разбор?";}
 else if(/привет|аня|здрав/.test(Q))r="Да, я вас слушаю, Александр. Чем помочь?";
 else r="Принято. Разберу и распределю агентам. Решения по покупкам и важным изменениям — только с вашим подтверждением.";
 return r;}
function sendAnni(){const i=document.getElementById('amsg');const v=i.value.trim();if(!v)return;CHAT.push({r:"me",t:v});i.value="";const r=anniReply(v);CHAT.push({r:"an",t:r});renderChat();speak(r);}

/* HIERARCHY */
function vHier(){const leaders=DB.users.filter(u=>u.role==="Создатель"||u.role==="Партнёр");
 let h='<div class="card"><div class="kana">団</div><h2>Иерархия агентов клана</h2>'+
 '<div class="tree"><div class="lname">L0 · ГЛАВНЫЙ</div><div class="node"><div class="av" style="border-color:var(--neon);color:var(--neon)">🧠</div><div><div class="nm">Anni</div><div class="rl">Главный агент · оркестратор</div></div></div>'+
 '<div class="lname">L1 · ЛИДЕРЫ</div>'+(leaders.length?leaders.map(u=>'<div class="node"><div class="av" style="border-color:var(--mag);color:var(--mag)">'+u.av+'</div><div><div class="nm">'+esc(u.name)+'</div><div class="rl">'+esc(u.role)+'</div></div></div>').join(""):'<div class="muted">Нет лидеров</div>')+
 '<div class="lname">L3 · КОМПАНИИ И ИХ АГЕНТЫ</div>'+DB.companies.map(c=>{const ag=DB.agents.filter(a=>a.coId===c.id);return '<div class="node" style="border-color:var(--gold)"><div class="av" style="border-color:var(--gold)">🏢</div><div><div class="nm">'+esc(c.name)+'</div><div class="rl">'+ag.length+' агент(ов): '+ag.map(a=>esc(a.name)).join(", ")+'</div></div></div>';}).join("")+
 '</div></div>';return h;}

/* COMPANIES */
function vCompanies(){return '<div class="card"><div class="kana">社</div><h2>Компании холдинга</h2><div class="grid g3">'+
 DB.companies.map(c=>'<div class="ent"><div class="row"><div class="av" style="border-color:var(--gold)">🏢</div><div><div class="nm">'+esc(c.name)+'</div><div class="rl">'+esc(c.dir||"—")+'</div></div></div><div class="muted" style="margin-top:8px">Доход: '+fmt(+c.income||0)+' € · Оборот: '+fmt(+c.turnover||0)+' €</div><div class="row" style="margin-top:10px"><button class="btn sec" data-open="'+c.id+'">Открыть</button></div></div>').join("")+'</div></div>'+
 (canManage()?'<div class="card"><h2>Добавить компанию</h2><div class="grid g2"><div><label>Название</label><input id="cName"/></div><div><label>Направление</label><input id="cDir"/></div></div><div style="margin-top:10px"><button class="btn pri" id="addCo">Создать</button></div></div>':'');}
function vCompany(cid){const c=coById(cid);if(!c)return vCompanies();const ag=DB.agents.filter(a=>a.coId===cid),pe=DB.people.filter(p=>p.coId===cid);
 return '<div class="card"><div class="row"><button class="btn sec" id="back">← Компании</button><span class="spacer"></span>'+(canManage()?'<button class="btn dng" data-delco="'+cid+'">Удалить</button>':'')+'</div></div>'+
 '<div class="card"><h2>'+esc(c.name)+'</h2><div class="grid g2"><div><label>Направление</label><input id="eDir" value="'+esc(c.dir)+'"></div><div><label>Описание</label><input id="eDesc" value="'+esc(c.desc)+'"></div><div><label>Доход €/мес</label><input id="eInc" type="number" value="'+(+c.income||0)+'"></div><div><label>Оборот €/мес</label><input id="eTov" type="number" value="'+(+c.turnover||0)+'"></div></div><div style="margin-top:10px"><button class="btn pri" data-saveco="'+cid+'">Сохранить</button></div></div>'+
 '<div class="card"><h2>Агенты ('+ag.length+')</h2><div class="grid g3">'+(ag.map(agentCard).join("")||'<div class="muted">Нет агентов</div>')+'</div></div>'+
 '<div class="card"><h2>Сотрудники ('+pe.length+')</h2><div class="grid g3">'+(pe.map(personCard).join("")||'<div class="muted">Нет сотрудников</div>')+'</div></div>';}

/* AGENTS + DOJO */
function agentCard(a){return '<div class="ent">'+(canManage()?'<button class="del" data-delag="'+a.id+'">✕</button>':'')+'<div class="row"><div class="av" style="border-color:'+a.col+';color:'+a.col+'">'+a.av+'</div><div><div class="nm">'+esc(a.name)+'</div><div class="rl">'+esc(a.role)+' · '+esc(cname(a.coId))+'</div></div></div><div class="chips">'+chips(a.skills)+'</div><div class="row" style="margin-top:8px"><span class="lvl">LVL '+(a.level||1)+'</span><div class="bar" style="flex:1"><i style="width:'+(a.xp||10)+'%"></i></div></div>'+(canManage()?'<div class="row" style="margin-top:8px"><button class="btn gold" data-train="'+a.id+'">Прокачать +25 XP</button></div>':'')+(a.accounts?'<div class="muted" style="margin-top:6px">Аккаунты: '+esc(a.accounts)+'</div>':'')+'</div>';}
function vAgents(){return '<div class="card"><div class="kana">士</div><h2>AI-агенты — додзё ('+DB.agents.length+')</h2><div class="grid g3">'+(DB.agents.map(agentCard).join("")||'<div class="muted">Пока нет агентов</div>')+'</div></div>'+
 (canManage()?'<div class="card"><h2>Создать агента</h2><div class="grid g2"><div><label>Имя</label><input id="agN"/></div><div><label>Роль/функция</label><input id="agR" placeholder="Лиды / Контент / DevOps"/></div><div><label>Компания</label>'+coSelect("agC")+'</div><div><label>Навыки (через запятую)</label><input id="agS"/></div><div><label>Привязанные аккаунты</label><input id="agA" placeholder="Telegram, почта, CRM"/></div></div><div style="margin-top:10px"><button class="btn pri" id="addAg">Создать</button></div></div>':'');}

/* PEOPLE */
function personCard(p){return '<div class="ent">'+(canManage()?'<button class="del" data-delp="'+p.id+'">✕</button>':'')+'<div class="row"><div class="av" style="border-color:'+p.col+';color:'+p.col+'">'+p.av+'</div><div><div class="nm">'+esc(p.name)+'</div><div class="rl">'+esc(p.role)+' · '+esc(cname(p.coId))+'</div></div></div><div class="chips">'+chips(p.skills)+'</div><div class="muted" style="margin-top:7px">Агент: <span class="tag">'+esc(agName(p.agentId))+'</span></div></div>';}
function vPeople(){return '<div class="card"><div class="kana">人</div><h2>Сотрудники — цифровые копии ('+DB.people.length+')</h2><div class="grid g3">'+(DB.people.map(personCard).join("")||'<div class="muted">Пока нет</div>')+'</div></div>'+
 (canManage()?'<div class="card"><h2>Добавить сотрудника</h2><div class="grid g2"><div><label>Имя</label><input id="pN"/></div><div><label>Роль</label><input id="pR"/></div><div><label>Компания</label>'+coSelect("pC")+'</div><div><label>Навыки/«шмотки»</label><input id="pS"/></div><div><label>Использует агента</label>'+agSelect("pAg")+'</div></div><div style="margin-top:10px"><button class="btn pri" id="addP">Добавить</button></div></div>':'');}

/* TASKS */
function vTasks(){const cols=[["todo","К выполнению","s-todo"],["doing","В работе","s-doing"],["done","Готово","s-done"]];
 let h='<div class="card"><div class="kana">任</div><h2>Задачи — квесты</h2>';
 if(canManage())h+='<div class="grid g2"><div><label>Задача</label><input id="tT"/></div><div><label>Исполнитель</label>'+agSelect("tA")+'</div></div><div style="margin-top:10px"><button class="btn pri" id="addT">Создать квест</button></div>';
 h+='</div><div class="grid g3">'+cols.map(col=>'<div class="card"><h2>'+col[1]+'</h2>'+DB.tasks.filter(t=>t.status===col[0]).map(t=>'<div class="ent" style="margin-bottom:9px"><div class="nm" style="font-size:14px">'+esc(t.title)+'</div><div class="muted" style="margin-top:4px">→ '+esc(agName(t.assigneeId))+'</div><div class="bar"><i style="width:'+(t.progress||0)+'%"></i></div><div class="row" style="margin-top:8px"><span class="statusbadge '+col[2]+'">'+col[1]+'</span><span class="spacer"></span>'+(canManage()?'<button class="btn sec" data-adv="'+t.id+'">→ дальше</button><button class="del" data-delt="'+t.id+'">✕</button>':'')+'</div></div>').join("")+'</div>').join("")+'</div>';
 return h;}


/* INTEGRATIONS */
const INTEG=[
 ["Коммуникации",[["Telegram","💬"],["WhatsApp","🟢"],["Email","✉️"]]],
 ["Соцсети",[["Instagram","📸"],["TikTok","🎵"],["YouTube","▶️"]]],
 ["AI · нейросети",[["Claude API","🧠"],["Генерация изображений","🎨"],["Голос STT/TTS","🎙️"]]],
 ["Платежи · финтех",[["Bliss pay","💳"],["Stripe","🟣"],["PayPal","🅿️"]]],
 ["CRM · данные",[["Twenty CRM","📇"],["База данных","🗄️"]]],
 ["Хранилище · файлы",[["Google Drive","📁"],["MinIO / S3","🪣"]]],
 ["Автоматизация",[["n8n","🔗"],["Календарь","📅"]]],
 ["Недвижимость",[["Idealista","🏠"],["Fotocasa","🏡"]]],
];
function vInteg(){DB.integrations=DB.integrations||{};
 let h='<div class="card"><div class="kana">繋</div><h2>Интеграции</h2><div class="muted">Подключай системы клана. Управление статусом — здесь; живой обмен данными включается с бэкендом (Sarex) и твоими API-ключами (по разрешению).</div></div>';
 INTEG.forEach(function(grp){h+='<div class="card"><h2>'+grp[0]+'</h2><div class="grid g3">'+grp[1].map(function(it){var on=!!DB.integrations[it[0]];return '<div class="ent"><div class="row"><div class="av" style="border-color:'+(on?'var(--ok)':'var(--line)')+'">'+it[1]+'</div><div><div class="nm">'+it[0]+'</div><div class="rl" style="color:'+(on?'var(--ok)':'var(--mut)')+'">'+(on?'Подключено':'Не подключено')+'</div></div></div><div class="row" style="margin-top:10px">'+(canManage()?'<button class="btn '+(on?'dng':'pri')+'" data-int="'+it[0]+'">'+(on?'Отключить':'Подключить')+'</button>':'<span class="tag">'+(on?'вкл':'выкл')+'</span>')+'</div></div>';}).join("")+'</div></div>';});
 return h;}

/* DATA */
function vData(){return '<div class="card"><div class="kana">蔵</div><h2>Данные и независимость</h2><div class="muted">Данные хранятся локально в браузере. Экспортируй для бэкапа/переноса.</div><div class="row" style="margin-top:12px"><button class="btn pri" id="exp">⬇ Экспорт JSON</button><button class="btn sec" id="impBtn">⬆ Импорт</button><button class="btn dng" id="reset">Сбросить всё</button></div><input id="impFile" type="file" accept="application/json" class="hidden"/></div>';}

function coSelect(i){return '<select id="'+i+'">'+DB.companies.map(c=>'<option value="'+c.id+'">'+esc(c.name)+'</option>').join("")+'</select>'}
function agSelect(i){return '<select id="'+i+'"><option value="">— нет —</option>'+DB.agents.map(a=>'<option value="'+a.id+'">'+esc(a.name)+'</option>').join("")+'</select>'}

/* BIND */
function bind(){const q=s=>document.getElementById(s);
 if(q('addCo'))q('addCo').onclick=()=>{const n=val('cName');if(!n)return;DB.companies.push({id:id(),name:n,dir:val('cDir'),desc:"",income:0,turnover:0});save();render()};
 document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{sel=b.dataset.open;render()});
 if(q('back'))q('back').onclick=()=>{sel=null;render()};
 document.querySelectorAll('[data-saveco]').forEach(b=>b.onclick=()=>{const c=coById(b.dataset.saveco);c.dir=val('eDir');c.desc=val('eDesc');c.income=+val('eInc')||0;c.turnover=+val('eTov')||0;save();alert('Сохранено, Александр.')});
 document.querySelectorAll('[data-delco]').forEach(b=>b.onclick=()=>{if(confirm('Удалить компанию?')){DB.companies=DB.companies.filter(c=>c.id!==b.dataset.delco);sel=null;save();render()}});
 if(q('addAg'))q('addAg').onclick=()=>{const n=val('agN');if(!n)return;DB.agents.push({id:id(),name:n,role:val('agR'),coId:val('agC'),skills:val('agS'),accounts:val('agA'),level:1,xp:10,av:AV[DB.agents.length%AV.length],col:COL[DB.agents.length%COL.length]});save();render()};
 document.querySelectorAll('[data-train]').forEach(b=>b.onclick=()=>{const a=agById(b.dataset.train);a.xp=(a.xp||0)+25;if(a.xp>=100){a.xp-=100;a.level=(a.level||1)+1;}save();render()});
 document.querySelectorAll('[data-delag]').forEach(b=>b.onclick=()=>{DB.agents=DB.agents.filter(a=>a.id!==b.dataset.delag);save();render()});
 if(q('addP'))q('addP').onclick=()=>{const n=val('pN');if(!n)return;DB.people.push({id:id(),name:n,role:val('pR'),coId:val('pC'),skills:val('pS'),agentId:val('pAg'),av:AV[(DB.people.length+3)%AV.length],col:COL[(DB.people.length+2)%COL.length]});save();render()};
 document.querySelectorAll('[data-delp]').forEach(b=>b.onclick=()=>{DB.people=DB.people.filter(p=>p.id!==b.dataset.delp);save();render()});
 if(q('addT'))q('addT').onclick=()=>{const t=val('tT');if(!t)return;DB.tasks.push({id:id(),title:t,assigneeType:"agent",assigneeId:val('tA'),status:"todo",progress:0});save();render()};
 document.querySelectorAll('[data-adv]').forEach(b=>b.onclick=()=>{const t=DB.tasks.find(x=>x.id===b.dataset.adv);t.status=t.status==="todo"?"doing":(t.status==="doing"?"done":"done");t.progress=t.status==="doing"?50:(t.status==="done"?100:0);save();render()});
 document.querySelectorAll('[data-delt]').forEach(b=>b.onclick=()=>{DB.tasks=DB.tasks.filter(x=>x.id!==b.dataset.delt);save();render()});
 if(q('asend'))q('asend').onclick=sendAnni;
 if(q('amsg'))q('amsg').addEventListener('keydown',e=>{if(e.key==='Enter')sendAnni()});
 if(q('mic')){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(SR){const rec=new SR();rec.lang='ru-RU';rec.interimResults=false;q('mic').onclick=()=>{try{waveOn=true;rec.start()}catch(e){}};rec.onresult=e=>{document.getElementById('amsg').value=e.results[0][0].transcript;waveOn=false;sendAnni()};rec.onend=()=>waveOn=false;}else q('mic').onclick=()=>{CHAT.push({r:"an",t:"Голосовой ввод недоступен в этом браузере — напишите текстом."});renderChat()}}
 document.querySelectorAll('[data-int]').forEach(b=>b.onclick=()=>{DB.integrations=DB.integrations||{};const k=b.dataset.int;DB.integrations[k]=!DB.integrations[k];save();render()});
 if(q('exp'))q('exp').onclick=()=>{const b=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download="anni_clan_backup.json";a.click()};
 if(q('impBtn'))q('impBtn').onclick=()=>q('impFile').click();
 if(q('impFile'))q('impFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);d.session=DB.session;DB=d;save();render();alert('Импортировано.')}catch(x){alert('Файл не распознан')}};r.readAsText(f)};
 if(q('reset'))q('reset').onclick=()=>{if(confirm('Сбросить все данные?')){localStorage.removeItem(KEY);location.reload()}};
}
if(DB.session&&me())enter();
</script>
</body></html>
